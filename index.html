<!DOCTYPE html>
<html lang="ja">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaf開発サイト</title>
    <link rel="stylesheet" href="style.css">

</head>
<img src="images/leaf.png"alt="PLANTERのロゴ">

<body>
    <h1>PLANTER</h1>
    <h2>多機能便利ツールサイト</h2>
    <nav>
     <h2>メニュー</h2>
     <h3>カウントボタン</h3>
     <p id="countText">0</p>
     <button id="plusBtn">+1</button>
     <button id="minusBtn">-1</button>
     <button id="reset">リセット</button>

     <button id="greet">
      追加
     </button>


     <div id="list"></div>

     <input id="nameBox">

     <button id="btn">
      表示
     </button>
     <p id="result"></p>
     <script src="script.js"></script>
     <ul>
        <li><a href="tools/planning_tool.html">計画整理ツール</a></li>
        <li><a href="tools/memo_tool.html">メモ整理ツール</a></li>
        <li><a href="tools/habit_tool.html">習慣化ツール</a></li>
        <li><a href="tools/patchnote.html">パッチノート</a></li>
        <li><a href="tools/blog.html">開発者の話</a></li>
     </ul>
    </nav>
  <main> 
   <section>
    <p>PLANTER予定</p>
    <a href="https://github.com">
       GitHubを見る
    </a>
    <button aria-label="閉じる">
      開発状況を見る
    </button>
    
    <form action="messages.text">

      <label for="name">名前</label>
      <input type="text" id="name">
 
    </form>
    
    <p>
     <textarea
      rows="5"
      cols="30">
     </textarea>
    </p>
    <p>
     <button type="submit">
      送信
     </button>

    </p>
   </section>
  </main>
  <footer>
    <p>制作開始日 2026/6/7</p>
  </html>
</body>
